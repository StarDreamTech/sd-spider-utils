name: 发布 Python 包到 PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: 构建发行包
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: 安装构建工具
        run: python -m pip install build

      - name: 构建 wheel 和源码包
        run: python -m build

      - name: 上传构建产物
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: 发布到 PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sd-spider-utils
    permissions:
      id-token: write

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: 上传到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
